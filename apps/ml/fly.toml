app = "salvacao-ml"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  PYTORCH_ENABLE_MPS_FALLBACK = "1"

# Persistent volume for model weights (~1.5GB: MegaDescriptor-L + SAM2-Tiny + YOLO)
# Created once: flyctl volumes create salvacao_ml_cache --region mad --size 5
[[mounts]]
  source = "salvacao_ml_cache"
  destination = "/cache"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 2
    soft_limit = 1

[[vm]]
  memory = "4gb"
  cpu_kind = "shared"
  cpus = 2
