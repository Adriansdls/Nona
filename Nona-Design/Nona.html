<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Nona — design v3</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@300..700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    html, body { margin: 0; padding: 0; background: #ebe7df; font-family: 'Inter Tight', system-ui, sans-serif; }
    #root { min-height: 100vh; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="src/nona-system.jsx"></script>
  <script type="text/babel" src="src/nona-agent.jsx"></script>

  <script type="text/babel" src="src/design-canvas.jsx"></script>
  <script type="text/babel" src="src/browser-window.jsx"></script>

  <script type="text/babel" src="src/nona-home-A.jsx"></script>
  <script type="text/babel" src="src/nona-flow.jsx"></script>
  <script type="text/babel" src="src/nona-case.jsx"></script>

  <script type="text/babel" data-presets="react">
    (function(){
      const {
        DesignCanvas, DCSection, DCArtboard, DCPostIt,
        ChromeWindow, N, Logo, Pill,
        HomeA, HomeToIntake, CasePage,
      } = window;

      function ScreenFrame({ width = 1280, height = 820, scale = 0.5, children, url = 'nona.pt' }) {
        const w = width * scale, h = (height + 76) * scale;
        return (
          <div style={{ width: w, height: h, overflow: 'hidden', borderRadius: 14,
                        boxShadow: '0 1px 2px rgba(0,0,0,0.04), 0 12px 36px rgba(11,12,16,0.10)',
                        background: '#fff' }}>
            <div style={{ transform: `scale(${scale})`, transformOrigin: '0 0',
                          width, height: height + 76 }}>
              <ChromeWindow url={url} width={width} height={height + 76}
                            tabs={[{title:'nona'}, {title:'casos · faro'}, {title:'github'}]}
                            activeIndex={0}>
                <div style={{ width: '100%', height, overflow: 'hidden' }}>
                  {children}
                </div>
              </ChromeWindow>
            </div>
          </div>
        );
      }

      function App() {
        return (
          <DesignCanvas>
            <DCSection id="home" title="Home A · monocroma"
              subtitle="Sin indigo central. La marca la lleva la tipografía (italic Instrument). El input es ink, no color.">
              <DCArtboard id="home-A" label="Home A · v3" width={1280 * 0.6} height={(1380 + 76) * 0.6 * 0.66}>
                <ScreenFrame width={1280} height={1380} scale={0.6} url="nona.pt"><HomeA/></ScreenFrame>
              </DCArtboard>
            </DCSection>

            <DCSection id="flow" title="Home → Intake · transición cinemática"
              subtitle="5 fases. Sin recargar página. Pulsa los botones 1–5 abajo para scrubbear. Lo importante: el panel de actividad sólo aparece cuando la Nona empieza a hacer.">
              <DCArtboard id="flow-stage" label="Stage · interactivo" width={1240} height={820}>
                <ScreenFrame width={1240} height={820} scale={1} url="nona.pt">
                  <HomeToIntake/>
                </ScreenFrame>
              </DCArtboard>
            </DCSection>

            <DCSection id="case" title="Case page · v4"
              subtitle="Foto grande como hero · mapa pasa a herramienta de búsqueda (zonas quente/morna, riscos, checkpoints) · activity feed siempre vivo.">
              <DCArtboard id="case" label="Bento · live · Faro" width={1280 * 0.6} height={(2300 + 76) * 0.6 * 0.5}>
                <ScreenFrame width={1280} height={2300} scale={0.6} url="nona.pt/bento-faro-26mai"><CasePage/></ScreenFrame>
              </DCArtboard>
            </DCSection>

            <DCPostIt top={22} right={28} width={260} rotate={1}>
              El artboard «Stage · interactivo» está a tamaño real para que puedas tocar los botones 1–5 y ver la transición real, no escalada.
            </DCPostIt>
          </DesignCanvas>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
    })();
  </script>
</body>
</html>
