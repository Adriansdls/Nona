name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  privacy-check:
    name: Privacy language audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for accusatory language
        run: |
          grep -r --include="*.ts" --include="*.tsx" --include="*.json" \
            -l "robado\|ladrão\|sospechoso\|culpable\|delincuente" apps/ packages/ \
            && echo "PRIVACY VIOLATION: accusatory language found" && exit 1 || true

  lint-typecheck:
    name: Lint + TypeCheck
    runs-on: ubuntu-latest
    needs: privacy-check
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: TypeCheck
        run: pnpm typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-typecheck
    env:
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
      SUPABASE_SERVICE_ROLE_KEY: placeholder
      ML_SERVICE_URL: http://localhost:8000
      APP_CHIP_ENCRYPTION_KEY: placeholder
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build web
        run: pnpm --filter web build

  ml-check:
    name: ML service check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ml
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: latest
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies (no torch, CI only checks imports/syntax)
        run: uv sync --no-install-project
      - name: Syntax check
        run: uv run python -m py_compile main.py pipeline/detect.py pipeline/blur.py pipeline/quality.py pipeline/embed.py clients/supabase.py

  bot-check:
    name: Bot syntax check
    runs-on: ubuntu-latest
    needs: privacy-check
    defaults:
      run:
        working-directory: apps/bot
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: latest
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync
      - name: Syntax check
        run: uv run python -m py_compile main.py agent/brain.py agent/tools.py agent/prompts.py channels/telegram.py transcribe.py storage.py
      - name: Privacy check (accusatory language)
        run: |
          ! grep -rq "robado\|ladrão\|sospechoso\|culpable\|delincuente" \
            main.py agent/ channels/ && echo "Privacy check passed"
